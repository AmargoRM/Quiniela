name: Sync FIFA standings
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2,14,20 * * *'
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Sync FIFA standings fail-closed
        run: node scripts/sync-fifa-standings.js
      - name: Validate World Cup data
        run: node scripts/validate-worldcup-data.js
      - name: Commit valid sync changes
        run: |
          if [ -n "$(git status --porcelain data/matches.json data/results.json data/last-sync.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/matches.json data/results.json data/last-sync.json
            git commit -m "chore: sync FIFA standings data"
            git push
          else
            echo "No valid data changes to commit."
          fi
