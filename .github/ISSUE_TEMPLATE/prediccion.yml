name: Predicción de quiniela
description: Registra una predicción append-only para la Quiniela Mundial Oficina.
title: "Predicción: [número] - [nombre]"
labels: ["prediccion"]
body:
  - type: markdown
    attributes:
      value: |
        Completa este formulario una sola vez por versión. Si corriges antes del cierre, abre otro issue: el registro oficial será la línea copiada a `data/submissions.jsonl`.
  - type: input
    id: playerNumber
    attributes:
      label: Número de jugador
      description: Ejemplo 01, 02, 03.
      placeholder: "01"
    validations:
      required: true
  - type: input
    id: playerName
    attributes:
      label: Nombre
      placeholder: "Ana"
    validations:
      required: true
  - type: textarea
    id: predictions
    attributes:
      label: Predicciones
      description: Pega un arreglo JSON con matchId, teamA, teamB, goalsA, goalsB y winner.
      value: |
        [
          {"matchId":"P73","teamA":"Costa Norte","teamB":"Valle Sur","goalsA":1,"goalsB":1,"winner":"Costa Norte"}
        ]
    validations:
      required: true
